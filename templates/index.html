<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lyrner.se</title>
    <!-- Runs before CSS to apply the saved theme, preventing a flash of the wrong colour scheme -->
    <script>
        (function () {
            var saved = localStorage.getItem('theme');
            if (saved) document.documentElement.setAttribute('data-theme', saved);
        })();
    </script>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
</head>
<body>

<header class="site-header">
    <div class="container">
        <a href="/" class="site-logo">lyrner.se</a>
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark/light mode" title="Toggle theme">◑</button>
    </div>
</header>

<main class="main-content">
    <section class="hero container">
        <h1>Emil Malmsjö Lyrner</h1>
        <p class="hero-tagline">Software developer. Building things on the internet.</p>
    </section>

    <section class="container">
        <h2 class="section-label">Projects</h2>
        <div>
            <p>Currently this page is under construction. Testing some infrastructure code with automatic mapping of containers to subdomains.</p>
        </div>
    </section>

            {{end}}

</main>

<footer class="site-footer">
    <div class="container">
        <p>Emil Malmsjö Lyrner</p>
    </div>
</footer>

<script>
    function toggleTheme() {
        var root = document.documentElement;
        var current = root.getAttribute('data-theme');
        var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var isDark = current === 'dark' || (!current && systemDark);
        var next = isDark ? 'light' : 'dark';
        root.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
    }
</script>

</body>
</html>
